        <!--=============== CSS ===============-->

        <title> Portofolio Bimss </title>

    <body>

        <header class="header" id="header">

            <a href="#" class="nav__logo">Bimss</a>

            <!-- Menu -->
            <div class="nav__menu">
              <ul class="nav__list">

                  <a href="#skills" class="nav__link">

                  <a href="#work" class="nav__link">

                  <a href="#contact" class="nav__link">

                </div>

                <div class="home__handle">
                  <img src="assets/img/bimsss.png" alt="" class="home__img">

                <div class="home__social">
                  <a href="https://www.linkedin.com/in/bimamib16/" class="home__social-link">
                    <i class='bx bxl-linkedin-square' ></i>
                  </a>
                  <a href="https://www.github.com/bimamib" class="home__social-link">
                    <i class='bx bxl-github'></i>
                  </a>
                  <a href="https://www.instagram.com/bimamib_16" class="home__social-link">
                    <i class='bx bxl-instagram-alt' ></i>
                  </a>

                <a href="#about" class="home__scroll">
                  <i class='bx bx-mouse-alt home__scroll-icon' ></i>
